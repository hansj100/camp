{% extends 'base.html' %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
<div class="card">
  <h1>회원가입</h1>
  <form method="post">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" name="password" required>
    </div>
    <div class="form-group">
      <label>텔레그램 Chat ID <small style="color:#999">(선택 — 알림 받으려면 입력)</small></label>
      <input type="text" name="telegram_chat_id" placeholder="예: 123456789">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:.7rem;">가입하기</button>
  </form>
  <p style="text-align:center;margin-top:1rem;font-size:.9rem;">
    이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a>
  </p>
</div>
</div>
{% endblock %}
