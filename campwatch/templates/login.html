{% extends 'base.html' %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
<div class="card">
  <h1 style="text-align:center;">🏕️ CampWatch</h1>
  <p style="text-align:center;color:#777;margin-bottom:1.5rem;">캠핑장 예약 감시 서비스</p>
  <form method="post">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" name="password" required>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:.7rem;">로그인</button>
  </form>
  <p style="text-align:center;margin-top:1rem;font-size:.9rem;">
    계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a>
  </p>
</div>
</div>
{% endblock %}
