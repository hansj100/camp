{% extends "base.html" %}
{% block title %}국립공원 계정 설정{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto">
  <h2 style="margin:0 0 16px">⛺ 국립공원 예약 계정 연동</h2>
  <p style="font-size:.85rem;color:#718096;margin-bottom:16px">
    reservation.knps.or.kr 아이디/비밀번호를 저장하면 크롤러가 자동 로그인해서 실제 빈자리를 확인합니다.
  </p>
  <form method="POST">
    <div style="margin-bottom:12px">
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">아이디</label>
      <input type="text" name="knps_id" value="{{ knps_id_display or '' }}"
             style="width:100%;padding:8px 12px;border:1px solid #cbd5e0;border-radius:6px;box-sizing:border-box">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">비밀번호</label>
      <input type="password" name="knps_pw" placeholder="{{ '저장됨 (변경 시 입력)' if user.knps_pw else '비밀번호 입력' }}"
             style="width:100%;padding:8px 12px;border:1px solid #cbd5e0;border-radius:6px;box-sizing:border-box">
      <span style="font-size:.78rem;color:#a0aec0">비워두면 기존 비밀번호 유지</span>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">저장</button>
  </form>
  {% if user.knps_id %}
  <div style="margin-top:12px;padding:10px;background:#c6f6d5;border-radius:6px;font-size:.85rem;color:#276749">
    ✅ 계정 연동됨 ({{ knps_id_display }}) &nbsp;🔒 암호화 저장
  </div>
  {% endif %}
  <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:.83rem;color:#718096">
    🌲 <a href="{{ url_for('settings_foresttrip') }}" style="color:#2e7d32">숲나들e 계정 설정</a>으로 이동
  </div>
</div>
{% endblock %}
