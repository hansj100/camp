{% extends 'base.html' %}
{% block content %}
<div style="max-width:500px;margin:0 auto;">
<div class="card">
  <h1>설정</h1>
  <form method="post">
    <div class="form-group">
      <label>텔레그램 Chat ID</label>
      <input type="text" name="telegram_chat_id" value="{{ user.telegram_chat_id or '' }}" placeholder="예: 123456789">
      <small style="color:#888;display:block;margin-top:.4rem;">
        Chat ID 확인: 텔레그램에서 @userinfobot 에게 /start 메시지를 보내면 확인할 수 있습니다.
      </small>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:.7rem;">저장</button>
  </form>
</div>

<div class="card" style="margin-top:1rem;border-top:3px solid #e53e3e">
  <h2 style="color:#c53030;margin-bottom:.5rem">서버 관리</h2>
  <p style="font-size:.85rem;color:#718096;margin-bottom:1rem">코드 업데이트 후 서버를 재시작할 때 사용하세요.</p>
  <form method="post" action="{{ url_for('restart_server') }}" onsubmit="return confirm('서버를 재시작할까요?')">
    <button class="btn btn-danger" style="width:100%;padding:.7rem;">🔄 서버 재시작</button>
  </form>
</div>
</div>
{% endblock %}
