{% extends 'base.html' %}
{% block content %}
<div style="max-width:500px;margin:0 auto;">
<div class="card">
  <h1>감시 조건 추가</h1>
  <form method="post">
    <div class="form-group">
      <label>캠핑장 이름 <small style="color:#999">(고캠핑 등록 이름)</small></label>
      <input type="text" name="camp_name" required placeholder="예: 설악산국립공원 야영장" autofocus>
    </div>
    <div class="form-group">
      <label>사이트 이름 <small style="color:#999">(선택 — 비워두면 전체 감시)</small></label>
      <input type="text" name="site_name" placeholder="예: A-1">
    </div>
    <div class="form-group">
      <label>체크인 날짜</label>
      <input type="date" name="check_in" required>
    </div>
    <div class="form-group">
      <label>체크아웃 날짜</label>
      <input type="date" name="check_out" required>
    </div>
    <div style="display:flex;gap:.8rem;">
      <button class="btn btn-primary" style="flex:1;padding:.7rem;">추가</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="flex:1;padding:.7rem;text-align:center;">취소</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
